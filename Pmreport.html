<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preventive Maintenance Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .form-input {
            transition: all 0.3s ease;
        }

        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
            border-color: #0ea5e9;
        }

        .btn-primary {
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid #9ca3af;
            border-radius: 4px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        input[type="checkbox"]:checked+.checkbox-custom {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
        }

        input[type="checkbox"]:checked+.checkbox-custom::after {
            content: "✓";
            color: white;
            font-size: 12px;
        }

        input[type="radio"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #9ca3af;
            border-radius: 50%;
            margin-right: 8px;
            position: relative;
            top: 3px;
            transition: all 0.2s ease;
        }

        input[type="radio"]:checked {
            border-color: #0ea5e9;
        }

        input[type="radio"]:checked::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 10px;
            height: 10px;
            background-color: #0ea5e9;
            border-radius: 50%;
        }

        .add-part-btn:hover i {
            transform: rotate(90deg);
        }

        .home-btn {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .home-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .toast {
            animation: slideIn 0.5s, fadeOut 0.5s 2.5s forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen p-6">
    <!-- Floating Home Button - Bottom Left Side -->
    <a href="Home.html" class="fixed bottom-6 left-6 z-50">
        <button
            class="home-btn flex items-center justify-center w-12 h-12 bg-primary-600 text-white rounded-full shadow-md hover:bg-primary-700">
            <i class="fas fa-home text-xl"></i>
        </button>
    </a>

    <div class="max-w-5xl mx-auto">
        <!-- Report Card -->
        <div class="bg-white p-8 rounded-xl shadow-lg">
            <!-- Header -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Preventive Maintenance Report</h1>
                    <p class="text-gray-600">Fill out the form to document maintenance activities</p>
                </div>
                <div class="bg-primary-100 p-3 rounded-lg">
                    <i class="fas fa-tools text-primary-600 text-2xl"></i>
                </div>
            </div>

            <form class="space-y-6">
                <!-- Equipment Information -->
                <div class="bg-primary-50 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-primary-800 mb-4 flex items-center">
                        <i class="fas fa-laptop-medical mr-2"></i> Equipment Information
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Hospital Name <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Department <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Brand Name <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Model <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">System S/N <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Software Version</label>
                            <input type="text"
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                    </div>
                </div>

                <!-- Maintenance Details -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-clipboard-check mr-2"></i> Maintenance Details
                    </h3>

                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Work Performed <span
                                class="text-red-500">*</span></label>
                        <textarea rows="4" required
                            class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                            placeholder="Describe the maintenance activities performed..."></textarea>
                    </div>

                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-3">Maintenance Status <span
                                class="text-red-500">*</span></label>
                        <div class="flex space-x-6">
                            <label class="flex items-center">
                                <input type="radio" name="status" value="complete" checked class="mr-2">
                                <span class="text-gray-700">Completed</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="status" value="incomplete" class="mr-2">
                                <span class="text-gray-700">Incomplete</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="status" value="partial" class="mr-2">
                                <span class="text-gray-700">Partially Completed</span>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Findings</label>
                            <textarea rows="3"
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                                placeholder="Any issues found during maintenance..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Recommendations</label>
                            <textarea rows="3"
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                                placeholder="Recommendations for future maintenance..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Parts Used Section -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-800 flex items-center">
                            <i class="fas fa-boxes mr-2"></i> Parts Used/Replaced
                        </h3>
                        <button type="button" id="addPartBtn"
                            class="add-part-btn flex items-center text-sm bg-primary-600 text-white px-3 py-1.5 rounded-lg hover:bg-primary-700">
                            <i class="fas fa-plus mr-1 transition-transform duration-300"></i> Add Part
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Part Name</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Part Number</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Quantity</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Replaced</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Required</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Action</th>
                                </tr>
                            </thead>
                            <tbody id="partsTableBody" class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <input type="text"
                                            class="form-input w-full px-2 py-1 border border-gray-300 rounded">
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <input type="text"
                                            class="form-input w-full px-2 py-1 border border-gray-300 rounded">
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <input type="number" min="1" value="1"
                                            class="form-input w-full px-2 py-1 border border-gray-300 rounded">
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-center">
                                        <label class="checkbox-label">
                                            <input type="checkbox" class="hidden">
                                            <span class="checkbox-custom"></span>
                                        </label>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-center">
                                        <label class="checkbox-label">
                                            <input type="checkbox" class="hidden">
                                            <span class="checkbox-custom"></span>
                                        </label>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-center">
                                        <button type="button" class="text-red-500 hover:text-red-700 remove-part">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Engineer Information -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-user-cog mr-2"></i> Engineer Information
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Engineer Name <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Start Time <span
                                    class="text-red-500">*</span></label>
                            <input type="time" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">End Time <span
                                    class="text-red-500">*</span></label>
                            <input type="time" required
                                class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        </div>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Additional Notes</label>
                        <textarea rows="2"
                            class="w-full form-input px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                            placeholder="Any additional comments..."></textarea>
                    </div>
                </div>

                <!-- Signature Section -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-signature mr-2"></i> Verification
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Engineer's Signature</label>
                            <div
                                class="border-2 border-dashed border-gray-300 rounded-lg h-20 flex items-center justify-center">
                                <button type="button" class="text-primary-600 hover:text-primary-800 flex items-center">
                                    <i class="fas fa-pen mr-2"></i> Click to sign
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Supervisor's Signature</label>
                            <div
                                class="border-2 border-dashed border-gray-300 rounded-lg h-20 flex items-center justify-center">
                                <button type="button" class="text-primary-600 hover:text-primary-800 flex items-center">
                                    <i class="fas fa-pen mr-2"></i> Click to sign
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button"
                        class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                        Save Draft
                    </button>
                    <button type="submit"
                        class="btn-primary px-6 py-2.5 bg-primary-600 text-white rounded-lg hover:bg-primary-700">
                        Submit Report
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-20 left-6 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg">
        <div class="flex items-center">
            <i class="fas fa-check-circle mr-2 text-xl"></i>
            <span>Report submitted successfully!</span>
        </div>
    </div>

    <script>
        // Add new part row functionality
        document.getElementById('addPartBtn').addEventListener('click', function () {
            const tableBody = document.getElementById('partsTableBody');
            const newRow = document.createElement('tr');
            newRow.className = 'bg-white';
            newRow.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">
                    <input type="text" class="form-input w-full px-2 py-1 border border-gray-300 rounded">
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <input type="text" class="form-input w-full px-2 py-1 border border-gray-300 rounded">
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <input type="number" min="1" value="1" class="form-input w-full px-2 py-1 border border-gray-300 rounded">
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                    <label class="checkbox-label">
                        <input type="checkbox" class="hidden">
                        <span class="checkbox-custom"></span>
                    </label>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                    <label class="checkbox-label">
                        <input type="checkbox" class="hidden">
                        <span class="checkbox-custom"></span>
                    </label>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                    <button type="button" class="text-red-500 hover:text-red-700 remove-part">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            `;
            tableBody.appendChild(newRow);

            // Add event listener to the new remove button
            newRow.querySelector('.remove-part').addEventListener('click', function () {
                tableBody.removeChild(newRow);
            });
        });

        // Add event listeners to existing remove buttons (if any)
        document.querySelectorAll('.remove-part').forEach(button => {
            button.addEventListener('click', function () {
                const row = this.closest('tr');
                document.getElementById('partsTableBody').removeChild(row);
            });
        });

        // Form validation before submission
        document.querySelector('form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Validate form
            const requiredFields = this.querySelectorAll('[required]');
            let isValid = true;

            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    field.classList.add('border-red-500');
                    isValid = false;
                } else {
                    field.classList.remove('border-red-500');
                }
            });

            if (!isValid) {
                alert('Please fill in all required fields marked with *');
                return;
            }

            // Show success toast
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            toast.classList.add('toast');

            // Hide toast after animation
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast');
            }, 3000);

            // Here you would typically submit the form to a server
            // For demo purposes, we'll just log the form data
            const formData = new FormData(this);
            console.log(Object.fromEntries(formData));
        });
    </script>
</body>

</html>
