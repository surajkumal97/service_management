<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Settings Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: all 0.3s ease;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        .animate-delay-1 {
            animation-delay: 0.1s;
        }

        .animate-delay-2 {
            animation-delay: 0.2s;
        }

        .animate-delay-3 {
            animation-delay: 0.3s;
        }

        .animate-delay-4 {
            animation-delay: 0.4s;
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 font-['Inter'] flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl w-full max-w-4xl overflow-hidden shadow-xl">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-500 to-green-300 p-6 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="Home.html">
                    <button class="p-2 rounded-full bg-white/20 hover:bg-white/30 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                    </button>
                </a>
                <h1 class="text-2xl font-semibold text-white">Settings Dashboard</h1>
            </div>
            <div class="text-white/90 font-medium">
                <span id="current-date">June 10, 2023</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- Card 1 -->
            <div class="glass-button rounded-xl p-5 animate-fadeIn animate-delay-1">
                <div class="flex items-start space-x-4">
                    <div class="p-3 bg-indigo-500/10 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-800">User Dashboard</h3>
                        <p class="text-sm text-gray-600 mt-1">Customize your working environment</p>
                        <a href="userdashboard.html">
                            <button
                                class="mt-3 text-sm font-medium text-indigo-600 hover:text-indigo-700 transition-colors">
                                Configure →
                            </button>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="glass-button rounded-xl p-5 animate-fadeIn animate-delay-2">
                <div class="flex items-start space-x-4">
                    <div class="p-3 bg-purple-500/10 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-purple-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-800">Role Management</h3>
                        <p class="text-sm text-gray-600 mt-1">Define user permissions and access</p>
                        <button
                            class="mt-3 text-sm font-medium text-purple-600 hover:text-purple-700 transition-colors">
                            Manage Roles →
                        </button>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="glass-button rounded-xl p-5 animate-fadeIn animate-delay-3">
                <div class="flex items-start space-x-4">
                    <div class="p-3 bg-pink-500/10 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-pink-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-800">User Accounts</h3>
                        <p class="text-sm text-gray-600 mt-1">Create and manage user profiles</p>
                        <button class="mt-3 text-sm font-medium text-pink-600 hover:text-pink-700 transition-colors">
                            Access Control →
                        </button>
                    </div>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="glass-button rounded-xl p-5 animate-fadeIn animate-delay-4">
                <div class="flex items-start space-x-4">
                    <div class="p-3 bg-blue-500/10 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c-.94 1.543.826 3.31 2.37 2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-800">System Settings</h3>
                        <p class="text-sm text-gray-600 mt-1">Advanced configuration options</p>
                        <button class="mt-3 text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors">
                            More Options →
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update date dynamically
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);
    </script>
</body>

</html>
