<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installation Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .status-available {
            background-color: #d1fae5;
            color: #065f46;
        }

        .status-in-use {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        .status-maintenance {
            background-color: #fef3c7;
            color: #92400e;
        }

        .category-filter {
            transition: all 0.2s ease;
        }

        .category-filter.active {
            background-color: #6366f1;
            color: white;
        }
    </style>
</head>

<body class="min-h-screen">
    <div class="container mx-auto px-4 py-8">

        <!-- Home Button -->
        <a href="tools.html"
            class="fixed bottom-6 left-6 z-10 flex items-center justify-center w-12 h-12 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 transition-all duration-300 animate-bounce">
            <i class="fas fa-home text-xl"></i>
        </a>
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8">
            <div class="flex items-center">

                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Installation Tools</h1>
                    <p class="text-gray-600 mt-2">Manage and track your installation tools inventory</p>
                </div>
            </div>

            <div class="flex items-center space-x-4 mt-4 md:mt-0">
                <div class="relative">
                    <input type="text" placeholder="Search tools..."
                        class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 w-full md:w-64">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
                <button id="addToolBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center">
                    <i class="fas fa-plus mr-2"></i> Add Tool
                </button>
            </div>
        </div>

        <!-- Filters and Stats -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                <div class="flex flex-wrap gap-2 mb-4 md:mb-0">
                    <!-- Status Filters -->
                    <div class="flex flex-wrap gap-2">
                        <button data-filter="all"
                            class="category-filter active bg-indigo-50 text-indigo-800 px-4 py-2 rounded-lg cursor-pointer">
                            All Tools <span
                                class="bg-indigo-600 text-white px-2 py-1 rounded-full text-xs ml-2">24</span>
                        </button>
                        <button data-filter="available"
                            class="category-filter bg-gray-100 text-gray-800 px-4 py-2 rounded-lg cursor-pointer hover:bg-gray-200">
                            Available <span
                                class="bg-green-600 text-white px-2 py-1 rounded-full text-xs ml-2">18</span>
                        </button>
                        <button data-filter="in-use"
                            class="category-filter bg-gray-100 text-gray-800 px-4 py-2 rounded-lg cursor-pointer hover:bg-gray-200">
                            In Use <span class="bg-red-600 text-white px-2 py-1 rounded-full text-xs ml-2">4</span>
                        </button>
                    </div>

                    <!-- Category Dropdown Filter -->
                    <div class="relative">
                        <button id="categoryFilterBtn"
                            class="flex items-center bg-white border border-gray-300 rounded-lg px-4 py-2 hover:bg-gray-50">
                            <i class="fas fa-filter text-gray-500 mr-2"></i>
                            <span>Category</span>
                            <i class="fas fa-chevron-down ml-2 text-xs text-gray-500"></i>
                        </button>
                        <div id="categoryDropdown"
                            class="absolute z-10 mt-1 w-48 bg-white rounded-md shadow-lg py-1 hidden">
                            <button data-category="all"
                                class="category-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">All
                                Categories</button>
                            <button data-category="installation"
                                class="category-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Installation
                                Tools</button>
                            <button data-category="general"
                                class="category-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">General
                                Tools</button>
                            <button data-category="electrical"
                                class="category-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Electrical
                                Tools</button>
                            <button data-category="plumbing"
                                class="category-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Plumbing
                                Tools</button>
                        </div>
                    </div>

                    <!-- Location Dropdown Filter -->
                    <div class="relative">
                        <button id="locationFilterBtn"
                            class="flex items-center bg-white border border-gray-300 rounded-lg px-4 py-2 hover:bg-gray-50">
                            <i class="fas fa-map-marker-alt text-gray-500 mr-2"></i>
                            <span>Location</span>
                            <i class="fas fa-chevron-down ml-2 text-xs text-gray-500"></i>
                        </button>
                        <div id="locationDropdown"
                            class="absolute z-10 mt-1 w-48 bg-white rounded-md shadow-lg py-1 hidden">
                            <button data-location="all"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">All
                                Locations</button>
                            <button data-location="Toolbox A"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Toolbox
                                A</button>
                            <button data-location="Toolbox B"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Toolbox
                                B</button>
                            <button data-location="Toolbox C"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Toolbox
                                C</button>
                            <button data-location="Job Site 1"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Job
                                Site 1</button>
                            <button data-location="Job Site 2"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Job
                                Site 2</button>
                            <button data-location="Job Site 3"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Job
                                Site 3</button>
                            <button data-location="Maintenance"
                                class="location-option block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 w-full text-left">Maintenance</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tools Table -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr class="text-left text-gray-600">
                            <th class="px-6 py-3 font-medium">Tool Name</th>
                            <th class="px-6 py-3 font-medium">Category</th>
                            <th class="px-6 py-3 font-medium">Location</th>
                            <th class="px-6 py-3 font-medium">Last Used</th>
                            <th class="px-6 py-3 font-medium">Status</th>
                            <th class="px-6 py-3 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="toolsTableBody">
                        <!-- Table rows will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
                <div class="text-sm text-gray-600">
                    Showing <span class="font-medium">1</span> to <span class="font-medium">10</span> of <span
                        class="font-medium">24</span> results
                </div>
                <div class="flex space-x-2">
                    <button class="px-3 py-1 border rounded-lg text-gray-600 hover:bg-gray-100">Previous</button>
                    <button class="px-3 py-1 border rounded-lg bg-indigo-600 text-white">1</button>
                    <button class="px-3 py-1 border rounded-lg text-gray-600 hover:bg-gray-100">2</button>
                    <button class="px-3 py-1 border rounded-lg text-gray-600 hover:bg-gray-100">3</button>
                    <button class="px-3 py-1 border rounded-lg text-gray-600 hover:bg-gray-100">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Tool Modal -->
    <div id="addToolModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-md">
            <div class="flex justify-between items-center border-b border-gray-200 px-6 py-4">
                <h3 class="text-lg font-semibold">Add New Tool</h3>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="toolForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Tool Name</label>
                        <input type="text"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Category</label>
                        <select
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            required>
                            <option value="">Select Category</option>
                            <option value="installation">Installation Tools</option>
                            <option value="general">General Tools</option>
                            <option value="electrical">Electrical Tools</option>
                            <option value="plumbing">Plumbing Tools</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Location</label>
                        <input type="text"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Status</label>
                        <select
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            required>
                            <option value="available">Available</option>
                            <option value="in-use">In Use</option>
                        </select>
                    </div>
                    <div class="flex justify-end space-x-3 mt-6">
                        <button type="button" id="cancelToolBtn"
                            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100">Cancel</button>
                        <button type="submit"
                            class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Save Tool</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Sample data for tools
        const tools = [
            { id: 1, name: "Cordless Drill", category: "Installation", location: "Toolbox A", lastUsed: "2023-05-15", status: "available" },
            { id: 2, name: "Impact Wrench", category: "Installation", location: "Job Site 3", lastUsed: "2023-05-18", status: "in-use" },
            { id: 3, name: "Torque Wrench", category: "Installation", location: "Toolbox B", lastUsed: "2023-05-10", status: "available" },
            { id: 4, name: "Hammer Drill", category: "Installation", location: "Maintenance", lastUsed: "2023-04-28", status: "maintenance" },
            { id: 5, name: "Screwdriver Set", category: "General", location: "Toolbox C", lastUsed: "2023-05-17", status: "available" },
            { id: 6, name: "Pipe Wrench", category: "Plumbing", location: "Job Site 2", lastUsed: "2023-05-19", status: "in-use" },
            { id: 7, name: "Multimeter", category: "Electrical", location: "Toolbox A", lastUsed: "2023-05-14", status: "available" },
            { id: 8, name: "Circular Saw", category: "Installation", location: "Job Site 1", lastUsed: "2023-05-16", status: "in-use" },
            { id: 9, name: "Level", category: "Installation", location: "Toolbox B", lastUsed: "2023-05-12", status: "available" },
            { id: 10, name: "Pliers Set", category: "General", location: "Toolbox C", lastUsed: "2023-05-11", status: "available" }
        ];

        // DOM Elements
        const toolsTableBody = document.getElementById('toolsTableBody');
        const addToolModal = document.getElementById('addToolModal');
        const addToolBtn = document.getElementById('addToolBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelToolBtn = document.getElementById('cancelToolBtn');
        const toolForm = document.getElementById('toolForm');
        const categoryFilterBtn = document.getElementById('categoryFilterBtn');
        const categoryDropdown = document.getElementById('categoryDropdown');
        const categoryOptions = document.querySelectorAll('.category-option');
        const statusFilters = document.querySelectorAll('[data-filter]');
        const locationFilterBtn = document.getElementById('locationFilterBtn');
        const locationDropdown = document.getElementById('locationDropdown');
        const locationOptions = document.querySelectorAll('.location-option');

        // Current filter state
        let currentStatusFilter = 'all';
        let currentCategoryFilter = 'all';
        let currentLocationFilter = 'all';

        // Render tools table with filters
        function renderToolsTable() {
            toolsTableBody.innerHTML = '';

            const filteredTools = tools.filter(tool => {
                // Apply status filter
                const statusMatch = currentStatusFilter === 'all' || tool.status === currentStatusFilter;
                // Apply category filter
                const categoryMatch = currentCategoryFilter === 'all' ||
                    tool.category.toLowerCase() === currentCategoryFilter.toLowerCase();
                // Apply location filter
                const locationMatch = currentLocationFilter === 'all' ||
                    tool.location === currentLocationFilter;

                return statusMatch && categoryMatch && locationMatch;
            });

            if (filteredTools.length === 0) {
                toolsTableBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-4 text-center text-gray-500">
                            No tools found matching your filters
                        </td>
                    </tr>
                `;
                return;
            }

            filteredTools.forEach(tool => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition';

                // Status badge class
                let statusClass = '';
                let statusText = '';
                switch (tool.status) {
                    case 'available':
                        statusClass = 'status-available';
                        statusText = 'Available';
                        break;
                    case 'in-use':
                        statusClass = 'status-in-use';
                        statusText = 'In Use';
                        break;
                    case 'maintenance':
                        statusClass = 'status-maintenance';
                        statusText = 'Maintenance';
                        break;
                }

                row.innerHTML = `
                    <td class="px-6 py-4 font-medium text-gray-900">${tool.name}</td>
                    <td class="px-6 py-4 text-gray-600">${tool.category}</td>
                    <td class="px-6 py-4 text-gray-600">${tool.location}</td>
                    <td class="px-6 py-4 text-gray-600">${tool.lastUsed}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-sm font-medium ${statusClass}">${statusText}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-indigo-600 hover:text-indigo-900 mr-3" onclick="editTool(${tool.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="text-red-600 hover:text-red-900" onclick="deleteTool(${tool.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;

                toolsTableBody.appendChild(row);
            });

            // Update counts in the UI
            updateFilterCounts();
        }

        // Update filter counts
        function updateFilterCounts() {
            const allCount = tools.length;
            const availableCount = tools.filter(t => t.status === 'available').length;
            const inUseCount = tools.filter(t => t.status === 'in-use').length;

            document.querySelector('[data-filter="all"] span').textContent = allCount;
            document.querySelector('[data-filter="available"] span').textContent = availableCount;
            document.querySelector('[data-filter="in-use"] span').textContent = inUseCount;
        }

        // Modal functions
        function openAddToolModal() {
            addToolModal.classList.remove('hidden');
        }

        function closeAddToolModal() {
            addToolModal.classList.add('hidden');
        }

        // Toggle dropdown functions
        function toggleCategoryDropdown() {
            categoryDropdown.classList.toggle('hidden');
        }

        function toggleLocationDropdown() {
            locationDropdown.classList.toggle('hidden');
        }

        // Event listeners
        addToolBtn.addEventListener('click', openAddToolModal);
        closeModalBtn.addEventListener('click', closeAddToolModal);
        cancelToolBtn.addEventListener('click', closeAddToolModal);
        categoryFilterBtn.addEventListener('click', toggleCategoryDropdown);
        locationFilterBtn.addEventListener('click', toggleLocationDropdown);

        // Status filter buttons
        statusFilters.forEach(button => {
            button.addEventListener('click', () => {
                // Remove active class from all buttons
                statusFilters.forEach(btn => btn.classList.remove('active', 'bg-indigo-50', 'text-indigo-800'));
                // Add active class to clicked button
                button.classList.add('active', 'bg-indigo-50', 'text-indigo-800');
                // Update current filter
                currentStatusFilter = button.dataset.filter;
                // Re-render table
                renderToolsTable();
            });
        });

        // Category filter options
        categoryOptions.forEach(option => {
            option.addEventListener('click', () => {
                currentCategoryFilter = option.dataset.category;
                // Update button text if not "All Categories"
                if (currentCategoryFilter !== 'all') {
                    categoryFilterBtn.querySelector('span').textContent = option.textContent;
                } else {
                    categoryFilterBtn.querySelector('span').textContent = 'Category';
                }
                // Close dropdown
                categoryDropdown.classList.add('hidden');
                // Re-render table
                renderToolsTable();
            });
        });

        // Location filter options
        locationOptions.forEach(option => {
            option.addEventListener('click', () => {
                currentLocationFilter = option.dataset.location;
                // Update button text if not "All Locations"
                if (currentLocationFilter !== 'all') {
                    locationFilterBtn.querySelector('span').textContent = option.textContent;
                } else {
                    locationFilterBtn.querySelector('span').textContent = 'Location';
                }
                // Close dropdown
                locationDropdown.classList.add('hidden');
                // Re-render table
                renderToolsTable();
            });
        });

        toolForm.addEventListener('submit', function (e) {
            e.preventDefault();
            // Here you would typically send the form data to a server
            alert('Tool added successfully!');
            closeAddToolModal();
        });

        // Tool functions (would be connected to backend in a real app)
        function editTool(id) {
            alert(`Editing tool with ID: ${id}`);
        }

        function deleteTool(id) {
            if (confirm('Are you sure you want to delete this tool?')) {
                alert(`Tool with ID: ${id} deleted`);
            }
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!categoryFilterBtn.contains(e.target) && !categoryDropdown.contains(e.target)) {
                categoryDropdown.classList.add('hidden');
            }
            if (!locationFilterBtn.contains(e.target) && !locationDropdown.contains(e.target)) {
                locationDropdown.classList.add('hidden');
            }
        });

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function () {
            renderToolsTable();
        });
    </script>
</body>

</html>
