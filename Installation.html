<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installation Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        .form-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .form-input {
            transition: all 0.3s ease;
            border: 1px solid #d1d5db;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-primary {
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-custom {
            width: 18px;
            height: 18px;
            border: 2px solid #9ca3af;
            border-radius: 50%;
            margin-right: 8px;
            position: relative;
        }

        input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        input[type="radio"]:checked+.radio-custom {
            border-color: var(--primary);
        }

        input[type="radio"]:checked+.radio-custom::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            border-radius: 50%;
        }

        .home-btn {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .home-btn:hover {
            transform: scale(1.05);
        }

        .signature-box {
            border: 2px dashed #d1d5db;
            border-radius: 0.5rem;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .signature-box:hover {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .toast {
            animation: slideIn 0.5s, fadeOut 0.5s 2.5s forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Report Card -->
        <div class="bg-white p-8 rounded-xl shadow-lg">
            <!-- Header -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Installation Report</h1>
                    <p class="text-gray-600">Document your installation process</p>
                </div>
                <div class="bg-blue-100 p-3 rounded-lg">
                    <i class="fas fa-wrench text-blue-600 text-2xl"></i>
                </div>
            </div>

            <form class="space-y-6">
                <!-- Equipment Information -->
                <div class="bg-blue-50 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-blue-800 mb-4 flex items-center">
                        <i class="fas fa-laptop-medical mr-2"></i> Equipment Information
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Hospital Name <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Department <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Brand Name <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Model <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">System S/N <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Software Version</label>
                            <input type="text" class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                    </div>
                </div>

                <!-- Installation Details -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-clipboard-check mr-2"></i> Installation Details
                    </h3>

                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Work Performed <span
                                class="text-red-500">*</span></label>
                        <textarea rows="4" required class="w-full form-input px-4 py-2 rounded-lg"
                            placeholder="Describe the installation activities performed..."></textarea>
                    </div>

                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-3">Installation Status <span
                                class="text-red-500">*</span></label>
                        <div class="flex space-x-6">
                            <label class="radio-label">
                                <input type="radio" name="status" value="complete" checked>
                                <span class="radio-custom"></span>
                                <span class="text-gray-700">Complete</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="status" value="incomplete">
                                <span class="radio-custom"></span>
                                <span class="text-gray-700">Incomplete</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                        <textarea rows="3" class="w-full form-input px-4 py-2 rounded-lg"
                            placeholder="Any additional notes..."></textarea>
                    </div>
                </div>

                <!-- Parts Used Section -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-800 flex items-center">
                            <i class="fas fa-boxes mr-2"></i> Parts Used
                        </h3>
                        <button type="button" id="addPartBtn"
                            class="flex items-center text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-plus mr-1"></i> Add Part
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Part Name</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Part Number</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Quantity</th>
                                    <th scope="col"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Action</th>
                                </tr>
                            </thead>
                            <tbody id="partsTableBody" class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <input type="text" class="form-input w-full px-3 py-1 rounded">
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <input type="text" class="form-input w-full px-3 py-1 rounded">
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <input type="number" min="1" value="1"
                                            class="form-input w-full px-3 py-1 rounded">
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-center">
                                        <button type="button" class="text-red-500 hover:text-red-700 remove-part">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Engineer Information -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-user-tie mr-2"></i> Engineer Information
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Engineer Name <span
                                    class="text-red-500">*</span></label>
                            <input type="text" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Start Date <span
                                    class="text-red-500">*</span></label>
                            <input type="date" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">End Date <span
                                    class="text-red-500">*</span></label>
                            <input type="date" required class="w-full form-input px-4 py-2 rounded-lg">
                        </div>
                    </div>
                </div>

                <!-- Verification Section -->
                <div class="bg-white border border-gray-200 p-5 rounded-lg">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-user-check mr-2 text-purple-500"></i> Verification
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Engineer's Verification</label>
                            <div class="signature-box" id="engineerSignatureBox">
                                <span class="text-gray-500" id="engineerSignatureText">
                                    <i class="fas fa-pen mr-2"></i>Click to sign
                                </span>
                            </div>
                            <div class="mt-2">
                                <input type="text" class="w-full form-input px-4 py-2 rounded-lg"
                                    placeholder="Engineer's name" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Supervisor's
                                Verification</label>
                            <div class="signature-box" id="supervisorSignatureBox">
                                <span class="text-gray-500" id="supervisorSignatureText">
                                    <i class="fas fa-pen mr-2"></i>Click to sign
                                </span>
                            </div>
                            <div class="mt-2">
                                <input type="text" class="w-full form-input px-4 py-2 rounded-lg"
                                    placeholder="Supervisor's name">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button"
                        class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                        Save Draft
                    </button>
                    <button type="submit"
                        class="btn-primary px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Submit Report
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Home Button (Bottom Left) -->
    <a href="Home.html" class="fixed bottom-6 left-6 z-50">
        <button
            class="home-btn flex items-center justify-center w-12 h-12 bg-indigo-600 text-white rounded-full shadow-md hover:bg-indigo-700">
            <i class="fas fa-home text-xl"></i>
        </button>
    </a>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-20 left-6 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg">
        <div class="flex items-center">
            <i class="fas fa-check-circle mr-2 text-xl"></i>
            <span>Installation report submitted successfully!</span>
        </div>
    </div>

    <script>
        // Add new part row functionality
        document.getElementById('addPartBtn').addEventListener('click', function () {
            const tableBody = document.getElementById('partsTableBody');
            const newRow = document.createElement('tr');
            newRow.className = 'bg-white';
            newRow.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">
                    <input type="text" class="form-input w-full px-3 py-1 rounded">
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <input type="text" class="form-input w-full px-3 py-1 rounded">
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <input type="number" min="1" value="1" class="form-input w-full px-3 py-1 rounded">
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                    <button type="button" class="text-red-500 hover:text-red-700 remove-part">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            `;
            tableBody.appendChild(newRow);

            // Add event listener to the new remove button
            newRow.querySelector('.remove-part').addEventListener('click', function () {
                tableBody.removeChild(newRow);
            });
        });

        // Add event listeners to existing remove buttons
        document.querySelectorAll('.remove-part').forEach(button => {
            button.addEventListener('click', function () {
                const row = this.closest('tr');
                document.getElementById('partsTableBody').removeChild(row);
            });
        });

        // Signature functionality
        document.getElementById('engineerSignatureBox').addEventListener('click', function () {
            const text = document.getElementById('engineerSignatureText');
            text.innerHTML = '<i class="fas fa-check mr-2"></i>Signed';
            text.classList.remove('text-gray-500');
            text.classList.add('text-green-600');
        });

        document.getElementById('supervisorSignatureBox').addEventListener('click', function () {
            const text = document.getElementById('supervisorSignatureText');
            text.innerHTML = '<i class="fas fa-check mr-2"></i>Signed';
            text.classList.remove('text-gray-500');
            text.classList.add('text-green-600');
        });

        // Form validation before submission
        document.querySelector('form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Validate form
            const requiredFields = this.querySelectorAll('[required]');
            let isValid = true;

            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    field.classList.add('border-red-500');
                    isValid = false;
                } else {
                    field.classList.remove('border-red-500');
                }
            });

            if (!isValid) {
                alert('Please fill in all required fields marked with *');
                return;
            }

            // Show success toast
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            toast.classList.add('toast');

            // Hide toast after animation
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast');
            }, 3000);

            // Here you would typically submit the form to a server
            const formData = new FormData(this);
            console.log(Object.fromEntries(formData));
        });
    </script>
</body>

</html>
