<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .table-container {
            max-height: calc(100vh - 250px);
            overflow-y: auto;
        }

        .pagination-active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        @media (max-width: 768px) {

            .responsive-table th,
            .responsive-table td {
                padding: 0.5rem;
                font-size: 0.875rem;
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-600 to-indigo-800 shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="flex items-center mb-4 md:mb-0">
                    <i class="fas fa-laptop-medical text-white text-2xl mr-3"></i>
                    <h1 class="text-2xl font-bold text-white">Equipment Inventory</h1>
                </div>
                <div class="text-white flex items-center">
                    <span id="currentDate" class="text-indigo-100"></span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6 flex-grow">
        <!-- Action Bar -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
            <!-- Search Bar -->
            <div class="relative flex-grow max-w-2xl">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
                <input type="text" id="default-search" oninput="filterTable()"
                    class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Search by hospital, serial number...">
            </div>

            <!-- Add Equipment Button -->
            <button onclick="openAddModal()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg shadow transition-colors duration-200 flex items-center whitespace-nowrap">
                <i class="fas fa-plus-circle mr-2"></i> Add Equipment
            </button>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden table-container mb-4">
            <table class="w-full responsive-table">
                <thead class="bg-indigo-100 text-indigo-800">
                    <tr>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">ID</th>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">Hospital</th>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">Equipment ID</th>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">Serial No.</th>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">Model</th>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">Modality</th>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">Installation Date
                        </th>
                        <th class="px-4 py-3 text-left font-semibold text-sm uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200" id="equipmentTable">
                    <!-- Table rows will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div
            class="flex flex-col sm:flex-row items-center justify-between px-4 py-3 bg-white border-t border-gray-200 sm:px-6 rounded-b-xl">
            <div class="mb-2 sm:mb-0">
                <p class="text-sm text-gray-700">
                    Showing <span id="startItem" class="font-medium">1</span> to <span id="endItem"
                        class="font-medium">10</span> of <span id="totalItems" class="font-medium">0</span> results
                </p>
            </div>
            <div class="flex space-x-1">
                <button onclick="previousPage()" id="prevBtn"
                    class="relative inline-flex items-center px-3 py-1 rounded-l border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled>
                    Previous
                </button>
                <div id="pageNumbers" class="flex">
                    <!-- Page numbers will be added dynamically -->
                </div>
                <button onclick="nextPage()" id="nextBtn"
                    class="relative inline-flex items-center px-3 py-1 rounded-r border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled>
                    Next
                </button>
            </div>
        </div>
    </main>

    <!-- Home Button -->
    <div class="flex justify-center py-4">
        <a href="Home.html"
            class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white shadow-md transition-all duration-200">
            <i class="fas fa-home text-xl"></i>
        </a>
    </div>

    <!-- Add Equipment Modal -->
    <div id="addModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Add New Equipment</h2>
                <button onclick="closeAddModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="addEquipmentForm" class="space-y-4">
                <div>
                    <label for="hospital" class="block text-sm font-medium text-gray-700 mb-1">Hospital</label>
                    <input type="text" id="hospital" required
                        class="w-full p-2 rounded border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter hospital name">
                </div>
                <div>
                    <label for="equipmentId" class="block text-sm font-medium text-gray-700 mb-1">Equipment ID</label>
                    <input type="text" id="equipmentId" required
                        class="w-full p-2 rounded border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter equipment ID">
                </div>
                <div>
                    <label for="serialNo" class="block text-sm font-medium text-gray-700 mb-1">Serial Number</label>
                    <input type="text" id="serialNo" required
                        class="w-full p-2 rounded border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter serial number">
                </div>
                <div>
                    <label for="model" class="block text-sm font-medium text-gray-700 mb-1">Model</label>
                    <input type="text" id="model" required
                        class="w-full p-2 rounded border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Enter model">
                </div>
                <div>
                    <label for="modality" class="block text-sm font-medium text-gray-700 mb-1">Modality</label>
                    <select id="modality" required
                        class="w-full p-2 rounded border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Select modality</option>
                        <option value="Monitor">Monitor</option>
                        <option value="OT Light">OT Light</option>
                        <option value="Ventilator">Ventilator</option>
                        <option value="Ultrasound">Ultrasound</option>
                        <option value="X-Ray">X-Ray</option>
                        <option value="Lab Equipment">Lab Equipment</option>
                    </select>
                </div>
                <div>
                    <label for="installationDate" class="block text-sm font-medium text-gray-700 mb-1">Installation
                        Date</label>
                    <input type="date" id="installationDate" required
                        class="w-full p-2 rounded border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeAddModal()"
                        class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sample data - in a real app, this would come from an API
        let equipmentData = [
            { id: 1, hospital: "Chitwan Medical College", equipmentId: "1234", serialNo: "Qrtt123445", model: "Vistal120", modality: "Monitor", installationDate: "2023-01-15" },
            { id: 2, hospital: "Chitwan Medical College", equipmentId: "Q4567", serialNo: "VS354748", model: "True Lite", modality: "OT Light", installationDate: "2023-02-20" },
            { id: 3, hospital: "Bharatpur Hospital", equipmentId: "7890", serialNo: "XT987654", model: "UltraScan Pro", modality: "Ultrasound", installationDate: "2023-03-10" },
            { id: 4, hospital: "Bharatpur Hospital", equipmentId: "3456", serialNo: "DR123456", model: "X-Ray 2000", modality: "X-Ray", installationDate: "2023-04-05" },
            { id: 5, hospital: "Kathmandu Medical Center", equipmentId: "5678", serialNo: "VT654321", model: "VentiCare", modality: "Ventilator", installationDate: "2023-05-12" },
            { id: 6, hospital: "Kathmandu Medical Center", equipmentId: "9012", serialNo: "MN876543", model: "Vistal240", modality: "Monitor", installationDate: "2023-06-18" },
            { id: 7, hospital: "Pokhara General Hospital", equipmentId: "2345", serialNo: "TL987654", model: "Bright Lite", modality: "OT Light", installationDate: "2023-07-22" },
            { id: 8, hospital: "Pokhara General Hospital", equipmentId: "6789", serialNo: "US123456", model: "ScanMaster", modality: "Ultrasound", installationDate: "2023-08-30" },
            { id: 9, hospital: "Nepal Medical College", equipmentId: "0123", serialNo: "XR654321", model: "X-Ray Pro", modality: "X-Ray", installationDate: "2023-09-14" },
            { id: 10, hospital: "Nepal Medical College", equipmentId: "4567", serialNo: "VT123456", model: "AirFlow", modality: "Ventilator", installationDate: "2023-10-05" },
            { id: 11, hospital: "Bir Hospital", equipmentId: "8901", serialNo: "MN654321", model: "CareView", modality: "Monitor", installationDate: "2023-11-11" },
            { id: 12, hospital: "Bir Hospital", equipmentId: "2345", serialNo: "LT987654", model: "Surgical Light", modality: "OT Light", installationDate: "2023-12-25" },
            { id: 13, hospital: "Research Lab", equipmentId: "LAB001", serialNo: "LB123456", model: "Centrifuge X", modality: "Lab Equipment", installationDate: "2024-01-10" },
            { id: 14, hospital: "Research Lab", equipmentId: "LAB002", serialNo: "LB654321", model: "Microscope Pro", modality: "Lab Equipment", installationDate: "2024-02-15" }
        ];

        // Pagination variables
        let currentPage = 1;
        const rowsPerPage = 5;

        // Display current date
        function displayDate() {
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = today.toLocaleDateString('en-US', options);
        }

        // Format date for display
        function formatDisplayDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        // Render the table with pagination
        function renderTable() {
            const tableBody = document.getElementById('equipmentTable');
            tableBody.innerHTML = '';

            // Calculate pagination
            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = Math.min(startIndex + rowsPerPage, equipmentData.length);
            const paginatedData = equipmentData.slice(startIndex, endIndex);

            // Update pagination info
            document.getElementById("startItem").textContent = startIndex + 1;
            document.getElementById("endItem").textContent = endIndex;
            document.getElementById("totalItems").textContent = equipmentData.length;

            // Enable/disable pagination buttons
            document.getElementById("prevBtn").disabled = currentPage === 1;
            document.getElementById("nextBtn").disabled = endIndex >= equipmentData.length;

            // Render table rows
            paginatedData.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                if (index % 2 === 0) {
                    row.classList.add('bg-gray-50');
                }
                row.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap">${item.id}</td>
                    <td class="px-4 py-3 whitespace-nowrap font-medium text-gray-900">${item.hospital}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.equipmentId}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.serialNo}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.model}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.modality}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${formatDisplayDate(item.installationDate)}</td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <button class="text-indigo-600 hover:text-indigo-900 mr-2">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="text-blue-600 hover:text-blue-900">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            renderPaginationButtons();
        }

        // Render pagination buttons
        function renderPaginationButtons() {
            const totalPages = Math.ceil(equipmentData.length / rowsPerPage);
            const pageNumbersContainer = document.getElementById("pageNumbers");
            pageNumbersContainer.innerHTML = '';

            // Always show first page
            if (totalPages > 0) {
                const firstPageBtn = document.createElement('button');
                firstPageBtn.textContent = '1';
                firstPageBtn.className = `relative inline-flex items-center px-3 py-1 border text-sm font-medium ${currentPage === 1 ? 'pagination-active' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'}`;
                firstPageBtn.onclick = () => goToPage(1);
                pageNumbersContainer.appendChild(firstPageBtn);
            }

            // Show ellipsis if needed
            if (currentPage > 3 && totalPages > 3) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                ellipsis.className = 'px-3 py-1';
                pageNumbersContainer.appendChild(ellipsis);
            }

            // Show current page and neighbors
            const startPage = Math.max(2, currentPage - 1);
            const endPage = Math.min(totalPages - 1, currentPage + 1);

            for (let i = startPage; i <= endPage; i++) {
                if (i > 1 && i < totalPages) {
                    const pageBtn = document.createElement('button');
                    pageBtn.textContent = i;
                    pageBtn.className = `relative inline-flex items-center px-3 py-1 border text-sm font-medium ${currentPage === i ? 'pagination-active' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'}`;
                    pageBtn.onclick = () => goToPage(i);
                    pageNumbersContainer.appendChild(pageBtn);
                }
            }

            // Show ellipsis if needed
            if (currentPage < totalPages - 2 && totalPages > 3) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                ellipsis.className = 'px-3 py-1';
                pageNumbersContainer.appendChild(ellipsis);
            }

            // Always show last page if there are multiple pages
            if (totalPages > 1) {
                const lastPageBtn = document.createElement('button');
                lastPageBtn.textContent = totalPages;
                lastPageBtn.className = `relative inline-flex items-center px-3 py-1 border text-sm font-medium ${currentPage === totalPages ? 'pagination-active' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'}`;
                lastPageBtn.onclick = () => goToPage(totalPages);
                pageNumbersContainer.appendChild(lastPageBtn);
            }
        }

        // Go to specific page
        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        // Go to next page
        function nextPage() {
            if (currentPage * rowsPerPage < equipmentData.length) {
                currentPage++;
                renderTable();
            }
        }

        // Go to previous page
        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        // Filter table based on search input
        function filterTable() {
            const searchTerm = document.getElementById('default-search').value.toLowerCase();

            if (searchTerm === '') {
                renderTable();
                return;
            }

            const filteredData = equipmentData.filter(item =>
                item.hospital.toLowerCase().includes(searchTerm) ||
                item.serialNo.toLowerCase().includes(searchTerm) ||
                item.equipmentId.toLowerCase().includes(searchTerm) ||
                item.model.toLowerCase().includes(searchTerm) ||
                item.modality.toLowerCase().includes(searchTerm)
            );

            // Temporarily display filtered data
            const tableBody = document.getElementById('equipmentTable');
            tableBody.innerHTML = '';

            filteredData.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                if (index % 2 === 0) {
                    row.classList.add('bg-gray-50');
                }
                row.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap">${item.id}</td>
                    <td class="px-4 py-3 whitespace-nowrap font-medium text-gray-900">${item.hospital}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.equipmentId}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.serialNo}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.model}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${item.modality}</td>
                    <td class="px-4 py-3 whitespace-nowrap">${formatDisplayDate(item.installationDate)}</td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <button class="text-indigo-600 hover:text-indigo-900 mr-2">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="text-blue-600 hover:text-blue-900">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Modal functions
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            // Set default installation date to today
            document.getElementById('installationDate').valueAsDate = new Date();
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('addEquipmentForm').reset();
        }

        // Handle form submission
        document.getElementById('addEquipmentForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const newEquipment = {
                id: equipmentData.length + 1,
                hospital: document.getElementById('hospital').value,
                equipmentId: document.getElementById('equipmentId').value,
                serialNo: document.getElementById('serialNo').value,
                model: document.getElementById('model').value,
                modality: document.getElementById('modality').value,
                installationDate: document.getElementById('installationDate').value
            };

            equipmentData.unshift(newEquipment); // Add to beginning of array
            closeAddModal();
            currentPage = 1; // Reset to first page
            renderTable();

            alert('Equipment added successfully!');
        });

        // Initialize
        window.onload = function () {
            displayDate();
            renderTable();
        };
    </script>
</body>

</html>
